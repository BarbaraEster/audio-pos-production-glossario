<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glossário de Áudio</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #121212;
    }

    .card {
      border-radius: 12px;
    }

    .descricao-completa {
      font-size: 0.9rem;
      opacity: 0.85;
    }

    mark {
      background-color: #ffc107;
      color: black;
      padding: 0 3px;
      border-radius: 3px;
    }
  </style>
</head>

<body class="text-light">

  <div class="container py-5">

    <h1 class="mb-4 text-center">🎧 Glossário de Áudio</h1>

    <!-- 🔍 Busca -->
    <div class="input-group mb-3">
      <span class="input-group-text">🔍</span>
      <input 
        type="text" 
        id="searchInput" 
        class="form-control"
        placeholder="Buscar termo ou descrição..."
      />
    </div>

    <!-- 🎯 Filtro -->
    <select id="categoryFilter" class="form-select mb-4">
      <option value="todas">Todas categorias</option>
    </select>

    <!-- 📚 Resultados -->
    <div id="results" class="row g-3"></div>

  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
